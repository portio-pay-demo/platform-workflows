name: ATR Dev Kickoff

on:
  workflow_dispatch:
    inputs:
      work_item_id:
        description: "Port Work Item ID (e.g. PP-8)"
        required: true

jobs:

  # Step 1: Fetch context from Port and create issue in the service repo
  create-issue:
    name: Create Engineering Brief Issue
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.create-issue.outputs.issue_number }}
      issue_url: ${{ steps.create-issue.outputs.issue_url }}
      repo_owner: ${{ steps.resolve-repo.outputs.repo_owner }}
      repo_name: ${{ steps.resolve-repo.outputs.repo_name }}
      work_item_title: ${{ steps.fetch-work-item.outputs.work_item_title }}
      service_id: ${{ steps.fetch-work-item.outputs.service_id }}

    steps:
      - name: Get Port Access Token
        id: port-token
        run: |
          TOKEN=$(curl -s -X POST https://api.getport.io/v1/auth/access_token \
            -H "Content-Type: application/json" \
            -d "{\"clientId\":\"${{ secrets.PORT_CLIENT_ID }}\",\"clientSecret\":\"${{ secrets.PORT_CLIENT_SECRET }}\"}" \
            | jq -r '.accessToken')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Fetch Work Item from Port
        id: fetch-work-item
        run: |
          ENTITY=$(curl -s \
            -H "Authorization: Bearer ${{ steps.port-token.outputs.token }}" \
            "https://api.getport.io/v1/blueprints/work_item/entities/${{ inputs.work_item_id }}")

          echo $ENTITY | jq -r '.entity.properties.prd'                    > /tmp/prd.md
          echo $ENTITY | jq -r '.entity.properties.ai_triage_notes'        > /tmp/triage_notes.md
          echo $ENTITY | jq -r '.entity.properties.blast_radius_analysis'  > /tmp/blast_radius.md

          echo "work_item_title=$(echo $ENTITY | jq -r '.entity.title')"                               >> $GITHUB_OUTPUT
          echo "routing_decision=$(echo $ENTITY | jq -r '.entity.properties.routing_decision')"        >> $GITHUB_OUTPUT
          echo "blast_radius_score=$(echo $ENTITY | jq -r '.entity.properties.blast_radius_score')"    >> $GITHUB_OUTPUT
          echo "service_id=$(echo $ENTITY | jq -r '.entity.relations.service')"                        >> $GITHUB_OUTPUT

      - name: Resolve Service Repo from Port
        id: resolve-repo
        run: |
          SERVICE_ID="${{ steps.fetch-work-item.outputs.service_id }}"

          SERVICE=$(curl -s \
            -H "Authorization: Bearer ${{ steps.port-token.outputs.token }}" \
            "https://api.getport.io/v1/blueprints/service/entities/$SERVICE_ID")

          REPO_ID=$(echo $SERVICE | jq -r '.entity.relations.github_repository')

          REPO=$(curl -s \
            -H "Authorization: Bearer ${{ steps.port-token.outputs.token }}" \
            "https://api.getport.io/v1/blueprints/githubRepository/entities/$REPO_ID")

          REPO_URL=$(echo $REPO | jq -r '.entity.properties.url')

          REPO_PATH=$(echo $REPO_URL | sed 's|https://github.com/||')
          REPO_OWNER=$(echo $REPO_PATH | cut -d'/' -f1)
          REPO_NAME=$(echo $REPO_PATH  | cut -d'/' -f2)

          echo "repo_owner=$REPO_OWNER" >> $GITHUB_OUTPUT
          echo "repo_name=$REPO_NAME"   >> $GITHUB_OUTPUT
          echo "Resolved repo: $REPO_OWNER/$REPO_NAME"

      - name: Create GitHub Issue in Service Repo
        id: create-issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const fs = require('fs');

            const prd         = fs.readFileSync('/tmp/prd.md', 'utf8');
            const triageNotes = fs.readFileSync('/tmp/triage_notes.md', 'utf8');
            const blastRadius = fs.readFileSync('/tmp/blast_radius.md', 'utf8');

            const routing    = '${{ steps.fetch-work-item.outputs.routing_decision }}';
            const blast      = '${{ steps.fetch-work-item.outputs.blast_radius_score }}';
            const workItemId = '${{ inputs.work_item_id }}';
            const title      = '${{ steps.fetch-work-item.outputs.work_item_title }}';
            const repoOwner  = '${{ steps.resolve-repo.outputs.repo_owner }}';
            const repoName   = '${{ steps.resolve-repo.outputs.repo_name }}';
            const serviceId  = '${{ steps.fetch-work-item.outputs.service_id }}';

            const blastEmoji   = { High: '🔴', Medium: '🟡', Low: '🟢' }[blast] ?? '⚪';
            const routingLabel = routing === 'Agent' ? '🤖 AI Led' : '👤 Human Required';

            const body = [
              `## 🤖 ATR Engineering Brief -- ${workItemId}`,
              ``,
              `> Auto-generated by Port's Autonomous Ticket Resolution system.`,
              `> Claude Code will implement this and open a pull request.`,
              ``,
              `| | |`,
              `|---|---|`,
              `| **Port Work Item** | \`${workItemId}\` |`,
              `| **Service** | \`${serviceId}\` |`,
              `| **Routing** | ${routingLabel} |`,
              `| **Blast Radius** | ${blastEmoji} ${blast} |`,
              ``,
              `---`,
              ``,
              `## 🔍 AI Triage Notes`,
              ``,
              triageNotes,
              ``,
              `---`,
              ``,
              `## 📋 Product Requirements Document`,
              ``,
              prd,
              ``,
              `---`,
              ``,
              `## 💥 Blast Radius Analysis`,
              ``,
              blastRadius,
              ``,
              `---`,
              ``,
              `> **For Claude Code:** Read the technical specification comment on this issue, then implement the changes.`,
              `> Create branch \`atr/${workItemId.toLowerCase()}\` from main, implement, and open a PR referencing this issue.`,
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: repoOwner,
              repo:  repoName,
              title: `[ATR] ${title}`,
              body,
              labels: ['atr', 'ai-generated']
            });

            console.log(`Created issue #${issue.data.number}: ${issue.data.html_url}`);
            core.setOutput('issue_number', issue.data.number);
            core.setOutput('issue_url',    issue.data.html_url);

  # Step 2: Generate technical specification and post as issue comment
  generate-tech-doc:
    name: Generate Technical Specification
    needs: create-issue
    runs-on: ubuntu-latest
    outputs:
      tech_spec: ${{ steps.generate.outputs.tech_spec }}

    steps:
      - name: Fetch issue body and generate tech spec
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Fetch the issue body (contains PRD, triage notes, blast radius)
          ISSUE_BODY=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ needs.create-issue.outputs.repo_owner }}/${{ needs.create-issue.outputs.repo_name }}/issues/${{ needs.create-issue.outputs.issue_number }}" \
            | jq -r '.body')

          echo "$ISSUE_BODY" > /tmp/issue_body.txt

          # Call Anthropic API to generate tech spec
          python3 << 'PYEOF'
          import json, os, urllib.request

          issue_body = open('/tmp/issue_body.txt').read()

          prompt = f"""You are a senior engineer at PortIOPay. Based on the engineering brief below, generate a concise but complete technical specification.

          ENGINEERING BRIEF:
          {issue_body}

          Generate a technical specification with these sections:

          ## Technical Approach
          Brief description of the implementation strategy and key design decisions.

          ## Affected Files
          List the specific files that need to be modified or created, with a one-line description of each change.

          ## Implementation Plan
          Numbered step-by-step implementation guide with code patterns to follow.

          ## API / Interface Changes
          Any new or modified interfaces, data structures, or API contracts.

          ## Testing Strategy
          Specific unit tests and integration tests to write, including key edge cases.

          ## Estimated Complexity
          S / M / L with 1-2 sentence reasoning.

          ## Risks & Mitigations
          Top 2-3 technical risks and how to address them.

          Be specific and actionable. Reference the exact service, tech stack, and file patterns from the brief."""

          payload = {
              'model': 'claude-opus-4-5',
              'max_tokens': 4096,
              'messages': [{'role': 'user', 'content': prompt}]
          }

          req = urllib.request.Request(
              'https://api.anthropic.com/v1/messages',
              data=json.dumps(payload).encode(),
              headers={
                  'x-api-key': os.environ['ANTHROPIC_API_KEY'],
                  'anthropic-version': '2023-06-01',
                  'content-type': 'application/json'
              }
          )

          with urllib.request.urlopen(req) as resp:
              result = json.loads(resp.read())
              tech_spec = result['content'][0]['text']
              open('/tmp/tech_spec.md', 'w').write(tech_spec)
              print(f"Tech spec generated ({len(tech_spec)} chars)")
          PYEOF

          # Set as multiline output
          echo "tech_spec<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/tech_spec.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post tech spec as issue comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const fs = require('fs');
            const techSpec = fs.readFileSync('/tmp/tech_spec.md', 'utf8');

            const body = [
              `## 📐 Technical Specification`,
              ``,
              `> Auto-generated by Port ATR. Claude Code will use this spec to implement the changes.`,
              ``,
              techSpec
            ].join('\n');

            await github.rest.issues.createComment({
              owner: '${{ needs.create-issue.outputs.repo_owner }}',
              repo:  '${{ needs.create-issue.outputs.repo_name }}',
              issue_number: ${{ needs.create-issue.outputs.issue_number }},
              body
            });

            console.log('Tech spec posted as comment on issue #${{ needs.create-issue.outputs.issue_number }}');

  # Step 3: Claude Code implements based on issue + tech spec comment
  claude-code:
    name: Claude Code Implementation
    needs: [create-issue, generate-tech-doc]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    outputs:
      pr_url: ${{ steps.find-pr.outputs.pr_url }}

    steps:
      - name: Checkout service repo
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.create-issue.outputs.repo_owner }}/${{ needs.create-issue.outputs.repo_name }}
          token: ${{ secrets.GH_PAT }}

      - name: Configure git credentials for Claude Code
        run: |
          git config --global user.email "claude-code@portio-pay-demo.com"
          git config --global user.name "Claude Code ATR"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ needs.create-issue.outputs.repo_owner }}/${{ needs.create-issue.outputs.repo_name }}.git

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        env:
          OVERRIDE_GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GH_PAT }}
          mode: agent
          allowed_tools: "Bash,Read,Write,Edit,MultiEdit,Glob,Grep"
          direct_prompt: |
            You have been assigned GitHub issue #${{ needs.create-issue.outputs.issue_number }}
            in ${{ needs.create-issue.outputs.repo_owner }}/${{ needs.create-issue.outputs.repo_name }}.

            Read the issue body AND the technical specification comment carefully.
            The issue body contains the PRD and requirements.
            The first comment contains the detailed technical specification with affected files and implementation plan.

            Your task:
            1. Create branch `atr/${{ inputs.work_item_id }}` from main.
            2. Follow the technical specification exactly -- it lists the specific files to change and the implementation steps.
            3. Write or update tests as described in the tech spec.
            4. Open a pull request to main with:
               - Title: `[ATR] ${{ needs.create-issue.outputs.work_item_title }}`
               - Body: "Closes #${{ needs.create-issue.outputs.issue_number }}" followed by a summary of what was implemented.

      - name: Find opened PR
        id: find-pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const branch = `atr/${{ inputs.work_item_id }}`.toLowerCase();
            const { data: prs } = await github.rest.pulls.list({
              owner: '${{ needs.create-issue.outputs.repo_owner }}',
              repo:  '${{ needs.create-issue.outputs.repo_name }}',
              head:  `${{ needs.create-issue.outputs.repo_owner }}:${branch}`,
              state: 'open'
            });
            if (prs.length > 0) {
              core.setOutput('pr_url', prs[0].html_url);
              console.log(`Found PR: ${prs[0].html_url}`);
            } else {
              core.setOutput('pr_url', '');
              console.log('No open PR found on branch ' + branch);
            }

  # Step 4: Call back to Port with tech spec and PR
  notify-port:
    name: Update Port Work Item
    needs: [create-issue, generate-tech-doc, claude-code]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Upsert Work Item in Port
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.getport.io
          operation: UPSERT
          identifier: ${{ inputs.work_item_id }}
          blueprint: work_item
          properties: |-
            {
              "tech_spec": ${{ toJSON(needs.generate-tech-doc.outputs.tech_spec) }},
              "pr_opened_at": "${{ github.run_started_at }}"
            }
