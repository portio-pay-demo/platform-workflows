name: ATR Dev Kickoff

on:
  workflow_dispatch:
    inputs:
      work_item_id:
        description: "Port Work Item ID (e.g. PP-8)"
        required: true

jobs:

  # Step 1: Fetch context from Port, create branch + draft PR, create engineering brief issue
  create-draft-pr:
    name: Open Draft PR and Engineering Brief
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.open-pr.outputs.pr_number }}
      pr_url: ${{ steps.open-pr.outputs.pr_url }}
      issue_number: ${{ steps.create-issue.outputs.issue_number }}
      issue_url: ${{ steps.create-issue.outputs.issue_url }}
      repo_owner: ${{ steps.resolve-repo.outputs.repo_owner }}
      repo_name: ${{ steps.resolve-repo.outputs.repo_name }}
      work_item_title: ${{ steps.fetch-work-item.outputs.work_item_title }}
      service_id: ${{ steps.fetch-work-item.outputs.service_id }}

    steps:
      - name: Get Port Access Token
        id: port-token
        run: |
          TOKEN=$(curl -s -X POST https://api.getport.io/v1/auth/access_token \
            -H "Content-Type: application/json" \
            -d "{\"clientId\":\"${{ secrets.PORT_CLIENT_ID }}\",\"clientSecret\":\"${{ secrets.PORT_CLIENT_SECRET }}\"}" \
            | jq -r '.accessToken')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Fetch Work Item from Port
        id: fetch-work-item
        run: |
          ENTITY=$(curl -s \
            -H "Authorization: Bearer ${{ steps.port-token.outputs.token }}" \
            "https://api.getport.io/v1/blueprints/work_item/entities/${{ inputs.work_item_id }}")

          echo $ENTITY | jq -r '.entity.properties.prd'                    > /tmp/prd.md
          echo $ENTITY | jq -r '.entity.properties.ai_triage_notes'        > /tmp/triage_notes.md
          echo $ENTITY | jq -r '.entity.properties.blast_radius_analysis'  > /tmp/blast_radius.md

          echo "work_item_title=$(echo $ENTITY | jq -r '.entity.title')"                               >> $GITHUB_OUTPUT
          echo "routing_decision=$(echo $ENTITY | jq -r '.entity.properties.routing_decision')"        >> $GITHUB_OUTPUT
          echo "blast_radius_score=$(echo $ENTITY | jq -r '.entity.properties.blast_radius_score')"    >> $GITHUB_OUTPUT
          echo "service_id=$(echo $ENTITY | jq -r '.entity.relations.service')"                        >> $GITHUB_OUTPUT

      - name: Resolve Service Repo from Port
        id: resolve-repo
        run: |
          SERVICE_ID="${{ steps.fetch-work-item.outputs.service_id }}"

          SERVICE=$(curl -s \
            -H "Authorization: Bearer ${{ steps.port-token.outputs.token }}" \
            "https://api.getport.io/v1/blueprints/service/entities/$SERVICE_ID")

          REPO_ID=$(echo $SERVICE | jq -r '.entity.relations.github_repository')

          REPO=$(curl -s \
            -H "Authorization: Bearer ${{ steps.port-token.outputs.token }}" \
            "https://api.getport.io/v1/blueprints/githubRepository/entities/$REPO_ID")

          REPO_URL=$(echo $REPO | jq -r '.entity.properties.url')
          REPO_PATH=$(echo $REPO_URL | sed 's|https://github.com/||')
          REPO_OWNER=$(echo $REPO_PATH | cut -d'/' -f1)
          REPO_NAME=$(echo $REPO_PATH  | cut -d'/' -f2)

          echo "repo_owner=$REPO_OWNER" >> $GITHUB_OUTPUT
          echo "repo_name=$REPO_NAME"   >> $GITHUB_OUTPUT
          echo "Resolved repo: $REPO_OWNER/$REPO_NAME"

      - name: Create branch and open draft PR
        id: open-pr
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BRANCH="atr/${{ inputs.work_item_id }}"
          OWNER="${{ steps.resolve-repo.outputs.repo_owner }}"
          REPO="${{ steps.resolve-repo.outputs.repo_name }}"
          TITLE="${{ steps.fetch-work-item.outputs.work_item_title }}"

          # Clone repo, create branch with empty commit
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/$OWNER/$REPO.git /tmp/service-repo
          cd /tmp/service-repo
          git config user.email "claude-code@portio-pay-demo.com"
          git config user.name "Claude Code ATR"
          git checkout -b "$BRANCH"
          git commit --allow-empty -m "chore: open ATR draft PR for ${{ inputs.work_item_id }} [skip ci]"
          git push origin "$BRANCH"

          # Open draft PR
          PR_URL=$(gh pr create \
            --repo "$OWNER/$REPO" \
            --head "$BRANCH" \
            --base main \
            --draft \
            --title "[ATR] $TITLE" \
            --body "## ATR Draft PR — ${{ inputs.work_item_id }}

            This PR was opened automatically by Port's Autonomous Ticket Resolution system.
            Claude Code will implement the changes and mark it ready for review.

            Engineering brief and technical specification will be posted as issue comments shortly.")

          PR_NUMBER=$(echo $PR_URL | grep -oE '[0-9]+$')
          echo "Opened draft PR #$PR_NUMBER: $PR_URL"
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_url=$PR_URL"       >> $GITHUB_OUTPUT

      - name: Create GitHub Issue with Engineering Brief
        id: create-issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const fs = require('fs');

            const prd         = fs.readFileSync('/tmp/prd.md', 'utf8');
            const triageNotes = fs.readFileSync('/tmp/triage_notes.md', 'utf8');
            const blastRadius = fs.readFileSync('/tmp/blast_radius.md', 'utf8');

            const routing    = '${{ steps.fetch-work-item.outputs.routing_decision }}';
            const blast      = '${{ steps.fetch-work-item.outputs.blast_radius_score }}';
            const workItemId = '${{ inputs.work_item_id }}';
            const title      = '${{ steps.fetch-work-item.outputs.work_item_title }}';
            const repoOwner  = '${{ steps.resolve-repo.outputs.repo_owner }}';
            const repoName   = '${{ steps.resolve-repo.outputs.repo_name }}';
            const serviceId  = '${{ steps.fetch-work-item.outputs.service_id }}';
            const prNumber   = '${{ steps.open-pr.outputs.pr_number }}';

            const blastEmoji   = { High: '🔴', Medium: '🟡', Low: '🟢' }[blast] ?? '⚪';
            const routingLabel = routing === 'Agent' ? '🤖 AI Led' : '👤 Human Required';

            const body = [
              `## 🤖 ATR Engineering Brief -- ${workItemId}`,
              ``,
              `> Auto-generated by Port's Autonomous Ticket Resolution system.`,
              `> Draft PR: #${prNumber} | Claude Code will implement and mark it ready for review.`,
              ``,
              `| | |`,
              `|---|---|`,
              `| **Port Work Item** | \`${workItemId}\` |`,
              `| **Service** | \`${serviceId}\` |`,
              `| **Routing** | ${routingLabel} |`,
              `| **Blast Radius** | ${blastEmoji} ${blast} |`,
              ``,
              `---`,
              ``,
              `## 🔍 AI Triage Notes`,
              ``,
              triageNotes,
              ``,
              `---`,
              ``,
              `## 📋 Product Requirements Document`,
              ``,
              prd,
              ``,
              `---`,
              ``,
              `## 💥 Blast Radius Analysis`,
              ``,
              blastRadius,
              ``,
              `---`,
              ``,
              `> **For Claude Code:** Read the technical specification comment, checkout branch \`atr/${workItemId.toLowerCase()}\`, implement, push commits, and mark PR #${prNumber} ready for review.`,
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: repoOwner,
              repo:  repoName,
              title: `[ATR] ${title}`,
              body,
              labels: ['atr', 'ai-generated']
            });

            console.log(`Created issue #${issue.data.number}: ${issue.data.html_url}`);
            core.setOutput('issue_number', issue.data.number);
            core.setOutput('issue_url',    issue.data.html_url);

  # Step 2: Immediately link the PR entity to the work item in Port
  notify-port-pr-link:
    name: Link Draft PR to Work Item in Port
    needs: create-draft-pr
    runs-on: ubuntu-latest

    steps:
      - name: Wait briefly for Port to ingest the PR
        run: sleep 15

      - name: Link PR relation and stamp pr_opened_at
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO_NAME="${{ needs.create-draft-pr.outputs.repo_name }}"
          PR_NUMBER="${{ needs.create-draft-pr.outputs.pr_number }}"
          PR_ENTITY_ID="${REPO_NAME}-${PR_NUMBER}"

          echo "Linking ${{ inputs.work_item_id }} to Port PR entity: $PR_ENTITY_ID"

          PORT_TOKEN=$(curl -s -X POST https://api.getport.io/v1/auth/access_token \
            -H "Content-Type: application/json" \
            -d "{\"clientId\":\"${{ secrets.PORT_CLIENT_ID }}\",\"clientSecret\":\"${{ secrets.PORT_CLIENT_SECRET }}\"}" \
            | jq -r '.accessToken')

          curl -s -X PATCH \
            "https://api.getport.io/v1/blueprints/work_item/entities/${{ inputs.work_item_id }}" \
            -H "Authorization: Bearer $PORT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"properties\": {\"pr_opened_at\": \"$TIMESTAMP\"},
              \"relations\": {\"pull_request\": \"$PR_ENTITY_ID\"}
            }" \
            | jq '{identifier: .entity.identifier, pr_relation: .entity.relations.pull_request, pr_opened_at: .entity.properties.pr_opened_at}'

  # Step 3: Read the real codebase and generate a grounded technical specification
  generate-tech-doc:
    name: Generate Technical Specification
    needs: create-draft-pr
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      issues: write
    outputs:
      tech_spec: ${{ steps.capture-tech-spec.outputs.tech_spec }}

    steps:
      - name: Checkout service repo
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.create-draft-pr.outputs.repo_owner }}/${{ needs.create-draft-pr.outputs.repo_name }}
          token: ${{ secrets.GH_PAT }}

      - name: Configure gh credentials
        run: echo "${{ secrets.GH_PAT }}" | gh auth login --with-token

      - name: Generate tech spec from real codebase
        uses: anthropics/claude-code-action@beta
        env:
          OVERRIDE_GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GH_PAT }}
          mode: agent
          allowed_tools: "Bash,Read,Glob,Grep"
          direct_prompt: |
            You are a senior engineer performing a technical design review.

            Your goal: read GitHub issue #${{ needs.create-draft-pr.outputs.issue_number }} in
            ${{ needs.create-draft-pr.outputs.repo_owner }}/${{ needs.create-draft-pr.outputs.repo_name }},
            explore the actual source code, and generate a grounded technical specification
            that references real files and functions.

            Steps:
            1. Read the issue: gh issue view ${{ needs.create-draft-pr.outputs.issue_number }}
            2. Explore the repo structure: list directories, read key source files relevant to the task.
               Look at existing patterns -- how is the code structured, what naming conventions are used,
               how are tests written.
            3. Generate a technical specification with these sections:

               ## Technical Approach
               Implementation strategy based on the existing code patterns.

               ## Affected Files
               Real file paths from this repo that need to change, with one line describing each change.

               ## Implementation Plan
               Numbered steps referencing actual functions, classes, and patterns found in the code.

               ## Interface Changes
               Any new types, interfaces, or API contracts needed.

               ## Testing Strategy
               Specific test cases to add, referencing existing test file patterns in this repo.

               ## Estimated Complexity
               S / M / L with reasoning based on the actual codebase.

               ## Risks & Mitigations
               Technical risks specific to this codebase and service.

            4. Post the spec as a comment on the issue:
               gh issue comment ${{ needs.create-draft-pr.outputs.issue_number }} --body "## 📐 Technical Specification

            > Auto-generated by Port ATR after reading the source code. Claude Code will follow this spec to implement the changes.

            <spec content here>"

            Do NOT make any code changes. Do NOT create branches or commits. Read only, then post the comment.

      - name: Capture tech spec from issue comment
        id: capture-tech-spec
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TECH_SPEC=$(gh api \
            repos/${{ needs.create-draft-pr.outputs.repo_owner }}/${{ needs.create-draft-pr.outputs.repo_name }}/issues/${{ needs.create-draft-pr.outputs.issue_number }}/comments \
            --jq '.[-1].body')

          echo "tech_spec<<EOF" >> $GITHUB_OUTPUT
          echo "$TECH_SPEC" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # Step 4: Save tech spec to Port
  notify-port-tech-spec:
    name: Save Tech Spec to Port
    needs: [create-draft-pr, generate-tech-doc]
    runs-on: ubuntu-latest

    steps:
      - name: Upsert tech spec on Work Item
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.getport.io
          operation: UPSERT
          identifier: ${{ inputs.work_item_id }}
          blueprint: work_item
          properties: |-
            {
              "tech_spec": ${{ toJSON(needs.generate-tech-doc.outputs.tech_spec) }}
            }

  # Step 5: Claude Code checks out existing branch, implements, pushes, marks PR ready
  claude-code:
    name: Claude Code Implementation
    needs: [create-draft-pr, notify-port-tech-spec]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout service repo on ATR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.create-draft-pr.outputs.repo_owner }}/${{ needs.create-draft-pr.outputs.repo_name }}
          ref: atr/${{ inputs.work_item_id }}
          token: ${{ secrets.GH_PAT }}

      - name: Configure git credentials
        run: |
          git config --global user.email "claude-code@portio-pay-demo.com"
          git config --global user.name "Claude Code ATR"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ needs.create-draft-pr.outputs.repo_owner }}/${{ needs.create-draft-pr.outputs.repo_name }}.git
          echo "${{ secrets.GH_PAT }}" | gh auth login --with-token

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        env:
          OVERRIDE_GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GH_PAT }}
          mode: agent
          allowed_tools: "Bash,Read,Write,Edit,MultiEdit,Glob,Grep"
          direct_prompt: |
            You have been assigned GitHub issue #${{ needs.create-draft-pr.outputs.issue_number }}
            in ${{ needs.create-draft-pr.outputs.repo_owner }}/${{ needs.create-draft-pr.outputs.repo_name }}.

            A draft PR #${{ needs.create-draft-pr.outputs.pr_number }} is already open on branch
            atr/${{ inputs.work_item_id }}. You are already checked out on that branch.

            Read the issue body AND the technical specification comment carefully.
            The issue body contains the PRD and requirements.
            The first comment contains the detailed technical specification with affected files and implementation steps.

            Your task:
            1. Implement the changes described in the technical specification. You are already on the correct branch.
            2. Write or update tests as described in the tech spec.
            3. Commit and push your changes: git add -A && git commit -m "..." && git push origin atr/${{ inputs.work_item_id }}
            4. Mark the draft PR ready for review: gh pr ready ${{ needs.create-draft-pr.outputs.pr_number }}
            5. Add a review comment to PR #${{ needs.create-draft-pr.outputs.pr_number }} summarizing what was implemented.

            Do NOT create a new branch. Do NOT open a new PR. Work only on the existing branch and PR.
